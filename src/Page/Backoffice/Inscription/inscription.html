    <div class="container">
        <h2>Gestion des Inscriptions</h2>
        <button onclick="ouvrirModal()" class="btn-add">+ Ajouter</button>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nom / Prénom</th>
                    <th>Date</th>
                    <th>Statut</th>
                    <th>Montant</th>
                    <th>Mode</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                </tbody>
        </table>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <span onclick="fermerModal()" class="close">&times;</span>
            <h3 id="modalTitle">Nouvelle Inscription</h3>
            <input type="text" id="nom" placeholder="Nom">
            <input type="text" id="prenom" placeholder="Prénom">
            <input type="text" id="montant" placeholder="Montant">
            <input type="date" id="date" placeholder="Date">
            <input type="text" id="mode" placeholder="Mode de paiement">
            <button onclick="sauvegarder()" class="btn-save">Enregistrer</button>
        </div>
    </div>



    <script src="inscription.js"></script>
