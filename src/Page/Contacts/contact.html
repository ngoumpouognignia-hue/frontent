<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="contact.css">
    <link rel="stylesheet" href="/Index.css">
        <link rel="stylesheet" href="/src/Page/Contacts/contact.css">
        <link rel="stylesheet" href="/src/Components/Header/Index.css">
        <link rel="stylesheet" href="/src/Components/Footer/index.css">
    
    <title>Contact - Promillys Academy</title>
</head>
<body>
    <div id="header"></div>
    
<div class="back-effect">
    <main class="contact-container">
        <h1>Contactez-nous</h1>
        <form id="contactForm">
            <label for="nom">Nom :</label>
            <input type="text" id="nom" required>
            
            <label for="email">Email :</label>
            <input type="email" id="email" required>
            
            <label for="message">Message :</label>
            <textarea id="message" required></textarea>
            
            <button class="btn-conf" type="submit">Envoyer</button>
        </form>
    </main>
    </div>

    <div id="footer"></div>
    <script src="/src/Components/Header/Index.js"></script>
    <script src="/src/Components/include.js"></script>
    <script src="/src/Page/Contacts/contact.js"></script>
    <script src="contact.js"></script>
</body>
</html>
